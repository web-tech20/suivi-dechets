version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: suivi_dechets_db
    environment:
      POSTGRES_USER: suivi_admin
      POSTGRES_PASSWORD: suivi_super_secret_2026
      POSTGRES_DB: suivi_dechets_v2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suivi_admin -d suivi_dechets_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: suivi_dechets_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
