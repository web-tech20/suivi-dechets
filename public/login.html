<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e27">
  <meta name="mobile-web-app-capable" content="yes">
  <title>SUIVI-DÉCHETS | Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo__icon glow-effect">
          <span class="material-symbols-outlined login-logo__icon-symbol" style="font-size: 32px;">delete</span>
        </div>
        <h1>SUIVI-DÉCHETS</h1>
        <p>Smart Waste Management — Dark Blue Elite</p>
      </div>

      <div id="errorMsg" class="login-error"></div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="exemple@suivi-dechets.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText">Se connecter</span>
        </button>
      </form>

      <div class="login-demo">
        <p>Comptes de démonstration</p>
        <div class="demo-buttons">
          <button type="button" class="demo-btn" data-email="super@suivi-dechets.com" data-password="Admin123!">Super Admin</button>
          <button type="button" class="demo-btn" data-email="admin@suivi-dechets.com" data-password="Admin123!">Admin</button>
          <button type="button" class="demo-btn" data-email="collecteur@suivi-dechets.com" data-password="Admin123!">Collecteur</button>
          <button type="button" class="demo-btn" data-email="observateur@suivi-dechets.com" data-password="Admin123!">Observateur</button>
        </div>
        <p style="margin-top: 14px; font-size: 11px; color: var(--text-muted);">Mot de passe : <strong style="color: var(--primary-light);">Admin123!</strong></p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3000'
      : 'https://suivi-dechets.onrender.com';

    function showError(message) {
      const el = document.getElementById('errorMsg');
      el.textContent = message;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4500);
    }

    async function login(email, password) {
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:8px;border-width:2px;"></span>Connexion...';

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Erreur de connexion');

        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (error) {
        showError(error.message);
        btn.disabled = false;
        btnText.textContent = 'Se connecter';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        showError('Veuillez remplir tous les champs');
        return;
      }
      login(email, password);
    });

    document.querySelectorAll('.demo-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.getElementById('email').value = btn.dataset.email;
        document.getElementById('password').value = btn.dataset.password;
        login(btn.dataset.email, btn.dataset.password);
      });
    });

    const token = localStorage.getItem('accessToken');
    if (token) {
      fetch(`${API_URL}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
        .then((r) => { if (r.ok) window.location.href = '/'; else localStorage.clear(); })
        .catch(() => localStorage.clear());
    }
  </script>
</body>
</html>
