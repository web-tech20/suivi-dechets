<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SUIVI-DÉCHETS — Plateforme smart city de gestion des déchets urbains">
  <meta name="theme-color" content="#0a0e27">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SUIVI-DÉCHETS">
  <title>SUIVI-DÉCHETS | Smart Waste Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="/styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body>
  <div id="premium-preloader" class="premium-preloader">
    <div class="preloader-content">
      <div class="sidebar__logo glow-effect preloader-logo">
        <span class="material-symbols-outlined preloader-icon" style="font-size: 40px;">delete</span>
      </div>
      <h2 class="preloader-title">SUIVI-DÉCHETS</h2>
      <div class="preloader-bar"><div class="preloader-progress"></div></div>
    </div>
  </div>
  <div id="app">
    <aside id="sidebar" class="sidebar sidebar--open">
      <div class="sidebar__header">
        <div class="sidebar__brand">
          <div class="sidebar__logo glow-effect">
            <span class="material-symbols-outlined sidebar__logo-icon" style="font-size: 28px;">delete</span>
          </div>
          <span class="sidebar__title">SUIVI-DÉCHETS</span>
        </div>
        <button id="sidebar-toggle" class="sidebar__toggle" aria-label="Menu">
          <span class="material-symbols-outlined icon-close">close</span>
          <span class="material-symbols-outlined icon-menu">menu</span>
        </button>
      </div>

      <nav class="sidebar__nav">
        <button class="sidebar__link sidebar__link--active" data-tab="dashboard">
          <span class="material-symbols-outlined">dashboard</span>
          <span>Dashboard</span>
        </button>
        <button class="sidebar__link" data-tab="carte">
          <span class="material-symbols-outlined">map</span>
          <span>Carte</span>
        </button>
        <button class="sidebar__link" data-tab="tournees">
          <span class="material-symbols-outlined">route</span>
          <span>Tournées</span>
        </button>
        <button class="sidebar__link" data-tab="alertes">
          <span class="material-symbols-outlined">notifications</span>
          <span>Alertes</span>
          <span id="alert-badge" class="sidebar__badge hidden">0</span>
        </button>
        <button class="sidebar__link" data-tab="statistiques">
          <span class="material-symbols-outlined">bar_chart</span>
          <span>Statistiques</span>
        </button>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__simulator">
          <button id="sim-toggle" class="btn btn--sim" type="button">
            <span class="material-symbols-outlined" style="font-size: 16px;">play_arrow</span>
            <span>Simulateur IoT</span>
          </button>
          <div id="sim-indicator" class="sim-indicator hidden">
            <span class="sim-dot"></span>
            <span class="sim-text">Simulation active</span>
          </div>
        </div>
        <div class="sidebar__user">
          <div class="sidebar__avatar">A</div>
          <div class="sidebar__user-info">
            <p class="sidebar__user-name">Administrateur</p>
            <p class="sidebar__user-role">SUPER_ADMIN</p>
          </div>
        </div>
      </div>
    </aside>

    <div id="main-content" class="main">
      <header id="header" class="header">
        <div class="header__left">
          <button id="mobile-menu-btn" class="mobile-menu-btn" type="button" aria-label="Ouvrir le menu">
            <span class="material-symbols-outlined">menu</span>
          </button>
          <div id="filter-chips" class="filter-chips" aria-label="Filtres">
            <button class="chip active" data-filter="all">Tous</button>
            <button class="chip" data-filter="signalement">Signalement</button>
            <button class="chip" data-filter="resolved">Résolus</button>
          </div>
          <button id="export-btn" title="Exporter PDF">Export</button>
          <button id="theme-toggle-btn" title="Basculer thème"><span class="material-symbols-outlined">dark_mode</span></button>
          <span id="system-load-badge" class="header__badge">—</span>
        </div>
        <div class="header__right">
          <button id="refresh-btn" class="header__btn" type="button" title="Actualiser">
            <span class="material-symbols-outlined">refresh</span>
          </button>
          <button id="export-dashboard-btn" class="header__btn" type="button" title="Exporter le dashboard">
            <span class="material-symbols-outlined">download</span>
          </button>
          <button id="theme-toggle" class="header__btn" type="button" title="Basculer thème nuit/jour">
            <span class="material-symbols-outlined">brightness_4</span>
          </button>
          <button id="notif-btn" class="header__btn header__btn--notif" type="button" title="Notifications">
            <span class="material-symbols-outlined">notifications</span>
            <span id="notif-dot" class="header__notif-dot hidden"></span>
          </button>
          <div class="header__divider"></div>
          <button id="logout-btn" class="header__btn" type="button" title="Déconnexion">
            <span class="material-symbols-outlined">logout</span>
          </button>
          <div class="header__profile">
            <div class="header__profile-text">
              <p class="header__profile-name">Admin</p>
              <p class="header__profile-role">SUPER_ADMIN</p>
            </div>
            <div class="header__profile-avatar">A</div>
          </div>
        </div>
      </header>

      <main id="page-content" class="content">
        <div class="content__loading">
          <div class="spinner"></div>
          <p>Chargement des données...</p>
        </div>
      </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script>
    const token = localStorage.getItem('accessToken');
    if (!token && window.location.pathname !== '/login') {
      window.location.href = '/login';
    }
    if (token && window.location.pathname === '/login') {
      window.location.href = '/';
    }
    
    // Premium Preloader Logic
    window.addEventListener('load', () => {
      setTimeout(() => {
        const preloader = document.getElementById('premium-preloader');
        if (preloader) {
          preloader.style.opacity = '0';
          setTimeout(() => preloader.style.display = 'none', 600);
        }
      }, 800); // 800ms loading effect for fluidity
    });
  </script>
  <script src="/app.js"></script>
</body>
</html>
