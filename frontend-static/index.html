<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SUIVI-DÉCHETS — Plateforme smart city de gestion des déchets urbains">
  <meta name="theme-color" content="#0a0e27">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SUIVI-DÉCHETS">
  <title>SUIVI-DÉCHETS | Smart Waste Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="/styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar sidebar--open">
      <div class="sidebar__header">
        <div class="sidebar__brand">
          <div class="sidebar__logo glow-effect">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              <line x1="10" y1="11" x2="10" y2="17"/>
              <line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
          </div>
          <span class="sidebar__title">SUIVI-DÉCHETS</span>
        </div>
        <button id="sidebar-toggle" class="sidebar__toggle" aria-label="Menu">
          <svg class="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          <svg class="icon-menu" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>

      <nav class="sidebar__nav">
        <button class="sidebar__link sidebar__link--active" data-tab="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="sidebar__link" data-tab="carte">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>Carte</span>
        </button>
        <button class="sidebar__link" data-tab="tournees">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>
          <span>Tournées</span>
        </button>
        <button class="sidebar__link" data-tab="alertes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span>Alertes</span>
          <span id="alert-badge" class="sidebar__badge hidden">0</span>
        </button>
        <button class="sidebar__link" data-tab="statistiques">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Statistiques</span>
        </button>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__simulator">
          <button id="sim-toggle" class="btn btn--sim" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span>Simulateur IoT</span>
          </button>
          <div id="sim-indicator" class="sim-indicator hidden">
            <span class="sim-dot"></span>
            <span class="sim-text">Simulation active</span>
          </div>
        </div>
        <div class="sidebar__user">
          <div class="sidebar__avatar">A</div>
          <div class="sidebar__user-info">
            <p class="sidebar__user-name">Administrateur</p>
            <p class="sidebar__user-role">SUPER_ADMIN</p>
          </div>
        </div>
      </div>
    </aside>

    <div id="main-content" class="main">
      <header id="header" class="header">
        <div class="header__left">
          <button id="mobile-menu-btn" class="mobile-menu-btn" type="button" aria-label="Ouvrir le menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
            <div id="filter-chips" class="filter-chips" aria-label="Filtres">
                <button class="chip active" data-filter="all">Tous</button>
                <button class="chip" data-filter="signalement">Signalement</button>
                <button class="chip" data-filter="resolved">Résolus</button>
            </div>
            <button id="export-btn" title="Exporter PDF">Export</button>
            <button id="theme-toggle-btn" title="Basculer thème">🌓</button>
            <span id="system-load-badge" class="header__badge">—</span>
            <span id="location-status-badge" class="header__badge">?</span>
            <span id="total-alerts-badge" class="header__badge">0</span>
        </div>
        <div class="header__right">
          <button id="refresh-btn" class="header__btn" type="button" title="Actualiser">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
          <button id="export-dashboard-btn" class="header__btn" type="button" title="Exporter le dashboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M5 17h14"/></svg>
          </button>
          <button id="theme-toggle" class="header__btn" type="button" title="Basculer thème nuit/jour">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <span id="location-status-badge" class="header__badge hidden" title="Statut de localisation"></span>
          <span id="total-alerts-badge" class="header__badge hidden" title="Alertes totales"></span>
          <button id="notif-btn" class="header__btn header__btn--notif" type="button" title="Notifications">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notif-dot" class="header__notif-dot hidden"></span>
          </button>
          <div class="header__divider"></div>
          <button id="logout-btn" class="header__btn" type="button" title="Déconnexion">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
          <div class="header__profile">
            <div class="header__profile-text">
              <p class="header__profile-name">Admin</p>
              <p class="header__profile-role">SUPER_ADMIN</p>
            </div>
            <div class="header__profile-avatar">A</div>
          </div>
        </div>
      </header>

      <main id="page-content" class="content">
        <div class="content__loading">
          <div class="spinner"></div>
          <p>Chargement des données...</p>
        </div>
      </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="/vendor/html2canvas/dist/html2canvas.min.js"></script>
  <script src="/vendor/jspdf/dist/jspdf.umd.min.js"></script>
  <script>
    const token = localStorage.getItem('accessToken');
    if (!token && window.location.pathname !== '/login') {
      window.location.href = '/login';
    }
    if (token && window.location.pathname === '/login') {
      window.location.href = '/';
    }
  </script>
  <script src="/app.js"></script>
</body>
</html>
